<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Name | Bleu Strnad</title>
<link rel="icon" href="favicon-32x32.png">
<style>
  :root {
    --bg-main: #0000aa;
    --bg-panel: rgba(255, 255, 255, 0.1);
    --text-main: #ffffff;
    --text-muted: #d9dcff;
    --border: rgba(255, 255, 255, 0.35);
    --max-width: 1100px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    height: 100%;
  }

  body {
    min-height: 100%;
    font-family: "Lucida Console", monospace;
    color: var(--text-main);
    background:
      radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.15), transparent 30%),
      radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.12), transparent 28%),
      var(--bg-main);
    line-height: 1.6;
    overflow-x: hidden;
    overflow-y: auto;
    padding: 1.25rem 1rem calc(5.5rem + env(safe-area-inset-bottom));
  }

  .project-page {
    max-width: var(--max-width);
    margin: 0 auto;
    display: grid;
    gap: 1.5rem;
  }

  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    backdrop-filter: blur(2px);
  }

  .project-title {
    font-size: clamp(2rem, 5vw, 3.8rem);
    letter-spacing: 0.06em;
    margin-bottom: 0.5rem;
  }

  .project-subtitle {
    color: var(--text-muted);
    font-size: clamp(1rem, 2.5vw, 1.25rem);
  }

  .gallery-subtitle {
    color: var(--text-muted);
    margin-bottom: 0.9rem;
    font-size: 0.95rem;
  }

  .section-title {
    margin-bottom: 0.8rem;
    font-size: clamp(1.1rem, 2.3vw, 1.5rem);
  }

  .content p + p {
    margin-top: 1rem;
  }

  .tech-list {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    gap: 0.55rem;
  }

  .tech-list li {
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.3rem 0.7rem;
    font-size: 0.95rem;
  }

  .gallery {
    display: grid;
    gap: 0.8rem;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  }

  .gallery figure {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    background: rgba(0, 0, 0, 0.2);
  }

  .gallery img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    aspect-ratio: 16 / 10;
    cursor: zoom-in;
  }

  .lightbox {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    background: rgba(0, 0, 0, 0.86);
    z-index: 1000;
  }

  .lightbox.is-open {
    display: flex;
  }

  .lightbox-content {
    width: min(1100px, 100%);
    max-height: 92vh;
    position: relative;
  }

  .lightbox-content img {
    width: 100%;
    max-height: 92vh;
    object-fit: contain;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #0b0b2a;
  }

  .lightbox-close {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    border: 1px solid var(--text-main);
    color: var(--text-main);
    background: rgba(0, 0, 170, 0.65);
    border-radius: 8px;
    padding: 0.35rem 0.65rem;
    cursor: pointer;
    font: inherit;
  }

  .lightbox-close:hover,
  .lightbox-close:focus-visible {
    background: var(--text-main);
    color: var(--bg-main);
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .button-link {
    display: inline-block;
    border: 1px solid var(--text-main);
    color: var(--text-main);
    text-decoration: none;
    padding: 0.65rem 1rem;
    border-radius: 8px;
    transition: background-color 0.2s ease, color 0.2s ease;
  }

  .button-link:hover,
  .button-link:focus-visible {
    background: var(--text-main);
    color: var(--bg-main);
  }

  @media (max-width: 640px) {
    body {
      padding: 1rem 0.85rem calc(6.5rem + env(safe-area-inset-bottom));
    }

    .panel {
      padding: 1rem;
    }
  }
</style>
</head>
<body>
  <main class="project-page">
    <header class="panel">
      <h1 class="project-title">[PROJECT_NAME]</h1>
      <p class="project-subtitle">[ONE-LINE TAGLINE] | September 14th, 2007 (enter the date of project)</p>
    </header>

    <section class="panel content" aria-labelledby="overview-heading">
      <h2 class="section-title" id="overview-heading">Project Overview</h2>
      <p>a very nice</p>
      <p>description of my</p>
      <p>awesome new project</p>
    </section>

    <!-- add tech stack panel if i want-->
   <!-- <section class="panel" aria-labelledby="stack-heading">
      <h2 class="section-title" id="stack-heading">Tech Stack</h2>
      <ul class="tech-list">
        <li>[Tech 1]</li>
        <li>[Tech 2]</li>
        <li>[Tech 3]</li>
        <li>[Tech 4]</li>
      </ul>
    </section>
    -->
    <section class="panel" aria-labelledby="gallery-heading">
      <h2 class="section-title" id="gallery-heading">Screenshots</h2>
      <p class="gallery-subtitle">Click to enhance</p>
      <div class="gallery">
        <figure><img src="images/ctflfg/ctflfg1.png" alt="Project screenshot 1"></figure>
        <figure><img src="images/ctflfg/ctflfg2.png" alt="Project screenshot 2"></figure>
        <figure><img src="images/ctflfg/ctflfg3.png" alt="Project screenshot 3"></figure>
      </div>
    </section>

    <nav class="actions" aria-label="Project links">
      <a class="button-link" href="#A LIVE URL" target="_blank" rel="noopener noreferrer">Visit GitHub Repository</a>
      <a class="button-link" href="portfolio.html">Back to Portfolio</a>
    </nav>
  </main>

  <div class="lightbox" id="image-lightbox" aria-hidden="true">
    <div class="lightbox-content">
      <button class="lightbox-close" type="button" aria-label="Close enlarged image">Close</button>
      <img id="lightbox-image" src="" alt="">
    </div>
  </div>

  <script>
    const lightbox = document.getElementById("image-lightbox");
    const lightboxImage = document.getElementById("lightbox-image");
    const closeButton = lightbox.querySelector(".lightbox-close");
    const galleryImages = document.querySelectorAll(".gallery img");

    function openLightbox(sourceImage) {
      lightboxImage.src = sourceImage.src;
      lightboxImage.alt = sourceImage.alt;
      lightbox.classList.add("is-open");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.classList.remove("is-open");
      lightbox.setAttribute("aria-hidden", "true");
      lightboxImage.src = "";
      document.body.style.overflow = "";
    }

    galleryImages.forEach((img) => {
      img.addEventListener("click", () => openLightbox(img));
    });

    closeButton.addEventListener("click", closeLightbox);
    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && lightbox.classList.contains("is-open")) {
        closeLightbox();
      }
    });
  </script>
</body>
</html>
